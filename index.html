<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Οι Βάρδιές μου</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --pri: #70d1ff; /* Πρωί */
            --syn: #ff2e2e; /* Συντήρηση */
            --apo: #c45b00; /* Απόγευμα */
            --vrad: #000000; /* Βράδυ */
            --repo: #7d7d7d; /* Αδιαθέτο */
        }
        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding-bottom: 20px; }
        .header { background: #222; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #444; }
        #monthTitle { font-size: 1.1rem; font-weight: bold; text-transform: uppercase; }
        button { background: #444; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-size: 1.2rem; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 5px; }
        .day-label { text-align: center; font-size: 0.7rem; color: #888; padding: 5px 0; font-weight: bold; }
        .cell { aspect-ratio: 1/1.3; border-radius: 4px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #333; }
        .num { font-size: 0.9rem; font-weight: bold; margin-bottom: 3px; }
        .shft { font-size: 0.75rem; font-weight: bold; }
        .loc { font-size: 0.55rem; opacity: 0.9; margin-top: 2px; }
        .shift-PR { background: var(--pri); color: black; }
        .shift-SY { background: var(--syn); color: white; }
        .shift-AP { background: var(--apo); color: white; }
        .shift-VR { background: var(--vrad); color: white; border: 1px solid #555; }
        .shift-AD { background: var(--repo); color: white; }
        .shift-8-16 { background: var(--pri); color: black; border: 2px dashed #000; }
        .weekend { border: 1.5px solid #007bff; }
        .stats { background: #222; margin: 15px; padding: 15px; border-radius: 10px; border: 1px solid #444; font-size: 0.9rem; line-height: 1.6; }
        .stats b { color: #70d1ff; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="moveMonth(-1)">❮</button>
        <div id="monthTitle"></div>
        <button onclick="moveMonth(1)">❯</button>
    </div>
    <div class="grid" id="calendarGrid"></div>
    <div class="stats" id="statsArea"></div>

    <script>
        let viewDate = new Date(2026, 3, 1); // Ξεκινάμε Απρίλιο 2026
        const anchor = new Date(2026, 2, 31); // 31/3 = Βράδυ ΝΔ

        const shifts = ["VR","AD","PR","SY","AP","VR","AD","8-16","SY","AP","VR","AD","PR","SY","AP","VR","AD","PR","SY","AP","VR","AD","PR","SY","AP"];
        const locs = ["ΝΔ","","Βουλή","---","Οικίες","Ηρώδου","","Κέντρο","---","ΝΔ","Βουλή","","Οικίες","---","Ηρώδου","Μον/κι","","ΝΔ","---","Βουλή","Οικίες","","Ηρώδου","---","---"];

        function render() {
            const grid = document.getElementById('calendarGrid');
            const title = document.getElementById('monthTitle');
            grid.innerHTML = '';
            
            const months = ["Ιανουάριος","Φεβρουάριος","Μάρτιος","Απρίλιος","Μάιος","Ιούνιος","Ιούλιος","Αύγουστος","Σεπτέμβριος","Οκτώβριος","Νοέμβριος","Δεκέμβριος"];
            title.innerText = months[viewDate.getMonth()] + " " + viewDate.getFullYear();

            ["ΔΕ","ΤΡ","ΤΕ","ΠΕ","ΠΑ","ΣΑ","ΚΥ"].forEach(d => {
                const el = document.createElement('div'); el.className='day-label'; el.innerText=d; grid.appendChild(el);
            });

            const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
            const last = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0);
            let start = first.getDay() === 0 ? 6 : first.getDay() - 1;

            for(let i=0; i<start; i++) grid.appendChild(document.createElement('div'));

            let vrad = 0, workedWE = 0;

            for(let d=1; d<=last.getDate(); d++) {
                const curr = new Date(viewDate.getFullYear(), viewDate.getMonth(), d);
                const diff = Math.floor((curr - anchor) / 86400000);
                let idx = diff % 25; if(idx < 0) idx += 25;

                const s = shifts[idx]; const l = locs[idx];
                const isWE = curr.getDay() === 0 || curr.getDay() === 6;
                if(s === "VR") vrad++;
                if(isWE && s !== "AD") workedWE++;

                const div = document.createElement('div');
                div.className = `cell shift-${s.replace(' ','-')} ${isWE?'weekend':''}`;
                div.innerHTML = `<span class="num">${d}</span><span class="shft">${s}</span><span class="loc">${l}</span>`;
                grid.appendChild(div);
            }

            document.getElementById('statsArea').innerHTML = `
                <b>Μηνιαία Σύνοψη:</b><br>
                🌙 Νυχτερινά: <b>${vrad}</b><br>
                💶 Πενθήμερα (ΣΚ): <b>${workedWE}</b>
            `;
        }

        function moveMonth(step) { viewDate.setMonth(viewDate.getMonth() + step); render(); }
        render();
    </script>
</body>
</html>
