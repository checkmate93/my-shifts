<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Work Tracker</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --txt: #ffffff;
            --pri: #70d1ff; --syn: #ff2e2e; --apo: #c45b00; --vrad: #000000; --repo: #7d7d7d;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: env(safe-area-inset-bottom); }
        .header { background: #222; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #444; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 10px; }
        .cell { aspect-ratio: 1/1.5; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #333; position: relative; font-size: 0.8rem; }
        .num { font-weight: bold; margin-bottom: 2px; }
        .shft { font-size: 0.7rem; font-weight: 900; }
        .loc { font-size: 0.5rem; opacity: 0.7; text-align: center; }
        
        /* Κατάσταση "Δουλεμένο" */
        .worked { outline: 3px solid #2ecc71; outline-offset: -3px; }
        .worked::after { content: "✓"; position: absolute; top: 2px; right: 2px; color: #2ecc71; font-size: 0.6rem; font-weight: bold; }

        .shift-PR { background: var(--pri); color: #000; }
        .shift-SY { background: var(--syn); color: #fff; }
        .shift-AP { background: var(--apo); color: #fff; }
        .shift-VR { background: var(--vrad); color: #fff; border: 1px solid #555; }
        .shift-AD { background: var(--repo); color: #fff; }

        .stats-box { background: #222; margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid #444; }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        .stat-line b { color: var(--pri); }

        /* Modal */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: #222; width: 85%; padding: 20px; border-radius: 15px; text-align: center; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .m-btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .confirm-btn { background: #2ecc71; color: white; grid-column: span 2; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <button onclick="changeMonth(-1)" style="background:none; color:white; border:none; font-size:1.5rem;">❮</button>
    <div id="monthLabel"></div>
    <button onclick="changeMonth(1)" style="background:none; color:white; border:none; font-size:1.5rem;">❯</button>
</div>

<div class="grid" id="grid"></div>

<div class="stats-box">
    <h3 style="margin-top:0; font-size:1rem; border-bottom:1px solid #444; padding-bottom:5px;">Σύνολα Μήνα (Επιβεβαιωμένα)</h3>
    <div class="stat-line">🌙 Νυχτερινά (ΒΡ): <b id="statVrad">0</b></div>
    <div class="stat-line">📅 Σάββατα: <b id="statSav">0</b></div>
    <div class="stat-line">⛪ Κυριακές: <b id="statKyri">0</b></div>
    <div class="stat-line">💰 Σύνολο Πενθημέρων: <b id="statTotal">0</b></div>
</div>

<div id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h4 id="dateDisplay"></h4>
        <button class="m-btn confirm-btn" id="confirmToggle" onclick="toggleWorked()">Σήμανση ως "Δουλεύτηκε"</button>
        <div style="font-size:0.8rem; color:#888; margin: 10px 0;">Ή άλλαξε τη βάρδια:</div>
        <div class="btn-group">
            <div class="m-btn shift-PR" onclick="updateShift('PR')">ΠΡ</div>
            <div class="m-btn shift-SY" onclick="updateShift('SY')">ΣΥ</div>
            <div class="m-btn shift-AP" onclick="updateShift('AP')">ΑΠ</div>
            <div class="m-btn shift-VR" onclick="updateShift('VR')">ΒΡ</div>
            <div class="m-btn shift-AD" onclick="updateShift('AD')">ΑΔ</div>
            <div class="m-btn" style="background:#444; color:white" onclick="closeModal()">Κλείσιμο</div>
        </div>
    </div>
</div>

<script>
    let d = new Date(2026, 3, 1);
    const anchor = new Date(2026, 2, 31);
    const baseS = ["VR","AD","PR","SY","AP","VR","AD","8-16","SY","AP","VR","AD","PR","SY","AP","VR","AD","PR","SY","AP","VR","AD","PR","SY","AP"];
    const baseL = ["ΝΔ","","Βουλή","---","Οικίες","Ηρώδου","","Κέντρο","---","ΝΔ","Βουλή","","Οικίες","---","Ηρώδου","Μον/κι","","ΝΔ","---","Βουλή","Οικίες","","Ηρώδου","---","---"];

    // Φόρτωση δεδομένων χρήστη
    let userShifts = JSON.parse(localStorage.getItem('userShifts')) || {};
    let workedDays = JSON.parse(localStorage.getItem('workedDays')) || {};
    let activeKey = null;

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const months = ["Ιανουάριος","Φεβρουάριος","Μάρτιος","Απρίλιος","Μάιος","Ιούνιος","Ιούλιος","Αύγουστος","Σεπτέμβριος","Οκτώβριος","Νοέμβριος","Δεκέμβριος"];
        document.getElementById('monthLabel').innerText = months[d.getMonth()] + " " + d.getFullYear();

        // Κενά αρχής
        let firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
        let offset = firstDay === 0 ? 6 : firstDay - 1;
        for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));

        let counts = { v:0, s:0, k:0 };

        let daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
        for(let i=1; i<=daysInMonth; i++) {
            let curr = new Date(d.getFullYear(), d.getMonth(), i);
            let key = curr.toISOString().split('T')[0];
            let diff = Math.floor((curr - anchor)/86400000);
            let idx = diff % 25; if(idx<0) idx+=25;

            let s = userShifts[key] || baseS[idx];
            let l = baseL[idx];
            let isWorked = workedDays[key];

            // Υπολογισμός στατιστικών μόνο για όσα τσεκαρίστηκαν
            if(isWorked) {
                if(s === "VR") counts.v++;
                if(curr.getDay() === 6) counts.s++;
                if(curr.getDay() === 0) counts.k++;
            }

            let cell = document.createElement('div');
            cell.className = `cell shift-${s.replace(' ','-')} ${isWorked ? 'worked' : ''}`;
            cell.innerHTML = `<span class="num">${i}</span><span class="shft">${s}</span><span class="loc">${s==='AD'?'':l}</span>`;
            cell.onclick = () => openModal(key, i, isWorked);
            grid.appendChild(cell);
        }

        document.getElementById('statVrad').innerText = counts.v;
        document.getElementById('statSav').innerText = counts.s;
        document.getElementById('statKyri').innerText = counts.k;
        document.getElementById('statTotal').innerText = counts.s + counts.k;
    }

    function openModal(key, dayNum, isWorked) {
        activeKey = key;
        document.getElementById('dateDisplay').innerText = dayNum + " " + document.getElementById('monthLabel').innerText;
        document.getElementById('confirmToggle').innerText = isWorked ? "Ακύρωση Επιβεβαίωσης" : "Επιβεβαίωση ότι Δούλεψα";
        document.getElementById('confirmToggle').style.background = isWorked ? "#e74c3c" : "#2ecc71";
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function toggleWorked() {
        if(workedDays[activeKey]) delete workedDays[activeKey];
        else workedDays[activeKey] = true;
        localStorage.setItem('workedDays', JSON.stringify(workedDays));
        closeModal(); render();
    }

    function updateShift(val) {
        userShifts[activeKey] = val;
        localStorage.setItem('userShifts', JSON.stringify(userShifts));
        closeModal(); render();
    }

    function changeMonth(n) { d.setMonth(d.getMonth()+n); render(); }
    render();
</script>
</body>
</html>
