<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work & Leaves Elite v6</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --txt: #ffffff;
            --pri: #70d1ff; --syn: #ff2e2e; --apo: #c45b00; --vrad: #000000; --repo: #4a4a4a; --green: #2ecc71; --purp: #a55eea;
            --event: #f1c40f; --danger: #ff4d4d;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 30px; }
        
        .tabs { display: flex; background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; padding: 5px; gap: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #222; color: #666; border-radius: 8px; font-weight: bold; font-size: 0.75rem; }
        .tab-btn.active { color: var(--pri); background: #333; }

        .box { background: #1a1a1a; margin: 12px; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .leave-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #222; }
        .leave-input { width: 50px; background: #333; border: 1px solid #444; color: var(--pri); text-align: center; padding: 5px; border-radius: 4px; font-weight: bold; }
        
        /* Event List Styles like Photo */
        .event-section-title { font-size: 0.8rem; font-weight: 800; color: var(--pri); text-decoration: underline; margin: 15px 0 8px 0; text-transform: uppercase; }
        .event-list-item { font-size: 0.75rem; padding: 4px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .event-date { color: var(--event); font-weight: 500; min-width: 90px; text-align: right; }
        .event-danger { color: var(--danger); font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 10px; }
        .cell { aspect-ratio: 1/1.5; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #222; position: relative; font-size: 0.75rem; overflow: hidden; }
        .shift-PR { background: var(--pri); color: #000; }
        .shift-SY { background: var(--syn); color: #fff; }
        .shift-AP { background: var(--apo); color: #fff; }
        .shift-VR { background: var(--vrad); color: #fff; border: 1px solid #444; }
        .shift-ΑΔ { background: var(--repo); color: #fff; }
        .shift-Ρεπ { background: #2a2a2a; color: #777; border: 1px dashed #444; }
        .worked { outline: 2px solid var(--green); outline-offset: -2px; }
        .btn-action { background: #333; color: white; font-weight: bold; padding: 12px; border-radius: 10px; border: 1px solid #444; width: calc(100% - 24px); margin: 5px 12px; cursor: pointer; font-size: 0.75rem; }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; width: 90%; max-height: 90vh; overflow-y: auto; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" id="btn-cal" onclick="showTab('calendar')">ΗΜΕΡΟΛΟΓΙΟ</button>
    <button class="tab-btn" id="btn-lea" onclick="showTab('leaves')">ΑΔΕΙΕΣ & ΣΧΟΛΙΑ</button>
</div>

<div id="tab-calendar">
    <div style="padding: 15px;">
        <select id="platoonSelect" style="width:100%; background:#222; color:var(--pri); border:1px solid #444; padding:10px; border-radius:8px;" onchange="changePlatoon()">
            <option value="351">ΔΙΜΟΙΡΙΑ 351</option><option value="352">ΔΙΜΟΙΡΙΑ 352</option><option value="353">ΔΙΜΟΙΡΙΑ 353</option><option value="354">ΔΙΜΟΙΡΙΑ 354</option><option value="355">ΔΙΜΟΙΡΙΑ 355</option>
        </select>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
            <button onclick="changeMonth(-1)" style="background:none; color:white; border:none; font-size:1.5rem;">❮</button>
            <div id="monthLabel" style="font-weight:bold; color:var(--pri);"></div>
            <button onclick="changeMonth(1)" style="background:none; color:white; border:none; font-size:1.5rem;">❯</button>
        </div>
    </div>
    <div class="grid" id="grid"></div>
    <button class="btn-action" onclick="toggleEvents()">📅 ΕΜΦΑΝΙΣΗ ΣΧΟΛΙΩΝ</button>
</div>

<div id="tab-leaves" style="display:none;">
    <div class="box">
        <h4 style="color:var(--pri); margin-top:0;">ΔΙΑΧΕΙΡΙΣΗ ΑΔΕΙΩΝ</h4>
        <div class="leave-row">
            <span>Κανονική (ΚΑ)</span>
            <div><input type="number" id="baseKA" class="leave-input" onchange="updateLeaveConfig()"> <small>Υπόλ:</small> <b id="remKA" style="color:var(--purp)">0</b></div>
        </div>
        <div class="leave-row">
            <span>Βραχεία (ΒΑ)</span>
            <div><input type="number" id="baseBA" class="leave-input" onchange="updateLeaveConfig()"> <small>Υπόλ:</small> <b id="remBA" style="color:var(--purp)">0</b></div>
        </div>
        <div class="leave-row">
            <span>Ρεπό Διαταγών (ΗΑ)</span>
            <div><input type="number" id="baseHA" class="leave-input" onchange="updateLeaveConfig()"> <small>Υπόλ:</small> <b id="remHA" style="color:var(--pri)">0</b></div>
        </div>
    </div>

    <div class="box">
        <h4 style="color:var(--event); margin-top:0;">ΠΕΡΙΟΔΟΙ ΠΡΟΓΡΑΜΜΑΤΟΣ</h4>
        <div id="photoStyleEvents"></div>
        
        <h4 style="color:var(--pri); margin-top:20px; border-top:1px solid #333; padding-top:10px;">ΠΡΟΣΩΠΙΚΑ ΣΧΟΛΙΑ</h4>
        <div id="userNotesList"></div>
    </div>

    <div class="box">
        <h4 style="color:var(--green); margin-top:0;">BACKUP ΔΕΔΟΜΕΝΩΝ</h4>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn" onclick="exportData()" style="background:var(--green); color:black;">ΕΞΑΓΩΓΗ</button>
            <button class="btn" onclick="document.getElementById('importFile').click()" style="background:#444; color:white;">ΕΙΣΑΓΩΓΗ</button>
        </div>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>
</div>

<div id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="dateDisplay" style="margin:0 0 15px 0;"></h3>
        <input type="text" id="dayNote" placeholder="Σχόλιο..." style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:white; border:1px solid #444; border-radius:8px;">
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px; margin-bottom:15px;">
            <div class="btn" style="background:var(--purp); font-size:0.7rem; text-align:center;" onclick="setLeave('ΚΑ')">ΚΑ</div>
            <div class="btn" style="background:var(--purp); font-size:0.7rem; text-align:center;" onclick="setLeave('ΒΑ')">ΒΑ</div>
            <div class="btn" style="background:var(--pri); font-size:0.7rem; text-align:center; color:black;" onclick="setLeave('ΗΑ')">ΗΑ</div>
            <div class="btn" style="background:#333; font-size:0.7rem; text-align:center;" onclick="setLeave(null)">X</div>
        </div>
        <button class="btn" onclick="saveDayNote(); closeModal();" style="width:100%; background:var(--green);">ΑΠΟΘΗΚΕΥΣΗ</button>
    </div>
</div>

<script>
    let d = new Date();
    const anchor = new Date(2026, 2, 31);
    const baseS = ["VR","ΑΔ","PR","SY","AP","VR","ΑΔ","PR","SY","AP","VR","ΑΔ","PR","SY","AP","VR","ΑΔ","PR","SY","AP","VR","ΑΔ","PR","SY","AP"];
    const platoonOffsets = { "351": 5, "352": 10, "353": 15, "354": 0, "355": 20 };

    const fixedEvents = {
        "ΜΑΧΙΜΩΝ - ΟΔΗΓΩΝ": [
            { t: "Α' περίοδος", d: "22/6 - 11/7" },
            { t: "Β' περίοδος", d: "12/7 - 31/7" },
            { t: "Γ' περίοδος", d: "1/8 - 20/8" },
            { t: "Δ' περίοδος", d: "21/8 - 9/9" }
        ],
        "ΒΑΘΜΟΦΟΡΩΝ": [
            { t: "Α' περίοδος", d: "1/7 - 20/7" },
            { t: "Β' περίοδος", d: "21/7 - 9/8" },
            { t: "Γ' περίοδος", d: "10/8 - 30/8" }
        ],
        "ΕΟΡΤΩΝ": [
            { t: "ΑΠΟΚΡΙΕΣ", d: "16/2 - 25/2" },
            { t: "ΠΑΣΧΑ", d: "6/4 - 15/4" },
            { t: "ΧΡΙΣΤΟΥΓΕΝΝΑ", d: "18/12 - 27/12" },
            { t: "ΠΡΩΤΟΧΡΟΝΙΑ", d: "28/12 - 6/1" }
        ],
        "ΑΠΑΓΟΡΕΥΣΗ ΑΔΕΙΩΝ": [
            { t: "ΕΠΕΤΕΙΟΣ ΤΕΜΠΩΝ", d: "28/2", danger: true },
            { t: "ΤΕΛΙΚΟΣ ΚΥΠΕΛΛΟΥ", d: "25/4", danger: true },
            { t: "FINAL 4", d: "21/5 - 25/5", danger: true },
            { t: "ΠΟΛΥΤΕΧΝΕΙΟ", d: "15/11 - 18/11", danger: true },
            { t: "ΓΡΗΓΟΡΟΠΟΥΛΟΣ", d: "4/12 - 7/12", danger: true }
        ]
    };

    let userShifts = JSON.parse(localStorage.getItem('userShifts')) || {};
    let leaveDays = JSON.parse(localStorage.getItem('leaveDays')) || {};
    let dayNotes = JSON.parse(localStorage.getItem('dayNotes')) || {};
    let leaveConfig = JSON.parse(localStorage.getItem('leaveConfig')) || { ka: 34, ba: 11, ha: 0 };
    let selectedPlatoon = localStorage.getItem('selectedPlatoon') || "354";
    let showEvents = true, activeKey = null;

    function render() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        const months = ["Ιανουάριος","Φεβρουάριος","Μάρτιος","Απρίλιος","Μάιος","Ιούνιος","Ιούλιος","Αύγουστος","Σεπτέμβριος","Οκτώβριος","Νοέμβριος","Δεκέμβριος"];
        document.getElementById('monthLabel').innerText = months[d.getMonth()] + " " + d.getFullYear();
        
        document.getElementById('baseKA').value = leaveConfig.ka;
        document.getElementById('baseBA').value = leaveConfig.ba;
        document.getElementById('baseHA').value = leaveConfig.ha || 0;

        let firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
        let offset = (firstDay === 0) ? 6 : firstDay - 1;
        for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));

        let daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
        let pOff = platoonOffsets[selectedPlatoon];

        for(let i=1; i<=daysInMonth; i++) {
            let curr = new Date(d.getFullYear(), d.getMonth(), i);
            let dateStr = curr.toISOString().split('T')[0];
            let diff = Math.floor((curr - anchor)/86400000);
            let idx = (diff + pOff) % 25; if(idx < 0) idx += 25;

            let s = userShifts[dateStr] || baseS[idx];
            let cell = document.createElement('div');
            cell.className = `cell shift-${s}`;
            
            let content = `<span class="num" style="position:absolute; top:2px; left:3px; opacity:0.5;">${i}</span>`;
            if(leaveDays[dateStr]) content += `<div style="position:absolute; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; font-weight:900;">${leaveDays[dateStr]}</div>`;
            else content += `<span style="font-weight:900; font-size:0.9rem;">${s}</span>`;

            if(showEvents && dayNotes[dateStr]) content += `<div style="position:absolute; bottom:0; left:0; right:0; height:4px; background:var(--event);"></div>`;
            
            cell.innerHTML = content;
            cell.onclick = () => openModal(dateStr, i);
            grid.appendChild(cell);
        }
        updateLeavesUI();
    }

    function updateLeavesUI() {
        let counts = { ΚΑ: 0, ΒΑ: 0, ΗΑ: 0 };
        Object.values(leaveDays).forEach(v => { if(counts[v] !== undefined) counts[v]++; });
        document.getElementById('remKA').innerText = leaveConfig.ka - counts.ΚΑ;
        document.getElementById('remBA').innerText = leaveConfig.ba - counts.ΒΑ;
        document.getElementById('remHA').innerText = (leaveConfig.ha || 0) - counts.ΗΑ;

        // Στυλ Φωτογραφίας
        let html = '';
        for(let section in fixedEvents) {
            html += `<div class="event-section-title">${section}</div>`;
            fixedEvents[section].forEach(ev => {
                html += `<div class="event-list-item"><span class="${ev.danger?'event-danger':''}">${ev.t}</span><span class="event-date">${ev.d}</span></div>`;
            });
        }
        document.getElementById('photoStyleEvents').innerHTML = html;

        // Προσωπικά Σχολιά
        let notesHtml = '';
        Object.keys(dayNotes).sort().forEach(k => {
            notesHtml += `<div class="event-list-item"><span>${dayNotes[k]}</span><span class="event-date">${k}</span></div>`;
        });
        document.getElementById('userNotesList').innerHTML = notesHtml || '<small style="color:#666">Κανένα σχόλιο</small>';
    }

    function updateLeaveConfig() {
        leaveConfig.ka = parseInt(document.getElementById('baseKA').value) || 0;
        leaveConfig.ba = parseInt(document.getElementById('baseBA').value) || 0;
        leaveConfig.ha = parseInt(document.getElementById('baseHA').value) || 0;
        localStorage.setItem('leaveConfig', JSON.stringify(leaveConfig));
        render();
    }

    function openModal(key, day) { activeKey = key; document.getElementById('dateDisplay').innerText = day + " " + document.getElementById('monthLabel').innerText; document.getElementById('dayNote').value = dayNotes[key] || ""; document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function saveDayNote() { let v = document.getElementById('dayNote').value.trim(); if(v) dayNotes[activeKey] = v; else delete dayNotes[activeKey]; localStorage.setItem('dayNotes', JSON.stringify(dayNotes)); render(); }
    function setLeave(t) { if(!t) delete leaveDays[activeKey]; else leaveDays[activeKey] = t; localStorage.setItem('leaveDays', JSON.stringify(leaveDays)); render(); closeModal(); }
    function showTab(t) { document.getElementById('tab-calendar').style.display = t==='calendar'?'block':'none'; document.getElementById('tab-leaves').style.display = t==='leaves'?'block':'none'; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t.substring(0,3)).classList.add('active'); render(); }
    function changeMonth(n) { d.setMonth(d.getMonth()+n); render(); }
    function changePlatoon() { selectedPlatoon = document.getElementById('platoonSelect').value; localStorage.setItem('selectedPlatoon', selectedPlatoon); render(); }
    function toggleEvents() { showEvents = !showEvents; render(); }

    function exportData() {
        const data = { userShifts, leaveDays, dayNotes, leaveConfig, selectedPlatoon };
        const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Backup_WorkLeaves.json`; a.click();
    }
    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = JSON.parse(ev.target.result);
            Object.assign(userShifts, data.userShifts); Object.assign(leaveDays, data.leaveDays);
            Object.assign(dayNotes, data.dayNotes); Object.assign(leaveConfig, data.leaveConfig);
            localStorage.setItem('userShifts', JSON.stringify(userShifts));
            window.location.reload();
        };
        reader.readAsText(e.target.files[0]);
    }

    render();
</script>
</body>
</html>
