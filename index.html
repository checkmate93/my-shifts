<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work & Leaves Elite v5</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --txt: #ffffff;
            --pri: #70d1ff; --syn: #ff2e2e; --apo: #c45b00; --vrad: #000000; --repo: #4a4a4a; --green: #2ecc71; --purp: #a55eea;
            --event: #f1c40f;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 30px; }
        
        .tabs { display: flex; background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; padding: 5px; gap: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #222; color: #666; border-radius: 8px; font-weight: bold; font-size: 0.75rem; }
        .tab-btn.active { color: var(--pri); background: #333; }

        .header { padding: 10px 15px; display: flex; flex-direction: column; gap: 10px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .month-label { font-weight: 800; font-size: 0.9rem; text-transform: uppercase; color: var(--pri); }

        .platoon-select {
            width: 100%; background: #222; color: var(--pri); border: 1px solid #444; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 0.85rem;
        }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 10px; }
        .days-header { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 10px 5px 10px; }
        .day-name { text-align: center; font-size: 0.65rem; color: #555; font-weight: bold; }

        .cell { aspect-ratio: 1/1.5; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #222; position: relative; font-size: 0.75rem; overflow: hidden; }
        .num { position: absolute; top: 2px; left: 3px; font-size: 0.65rem; opacity: 0.5; font-weight: bold; z-index: 10; }
        .shft { font-weight: 900; font-size: 0.85rem; z-index: 10; }
        .loc { font-size: 0.55rem; font-weight: bold; opacity: 0.9; text-align: center; margin-top: 3px; z-index: 10; line-height: 0.9; padding: 0 2px; }
        
        .event-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: var(--event); z-index: 12; }
        .event-text { position: absolute; bottom: 4px; left: 0; right: 0; font-size: 0.42rem; text-align: center; background: rgba(0,0,0,0.8); color: var(--event); font-weight: bold; white-space: nowrap; overflow: hidden; z-index: 13; }

        .worked { position: relative; outline: 2px solid var(--green); outline-offset: -2px; }
        .worked::after { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(46, 204, 113, 0.15) 5px, rgba(46, 204, 113, 0.15) 10px); z-index: 1; }
        .leave-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); font-size: 1rem; font-weight: 900; color: white; z-index: 15; }
        .stadium-mark { position: absolute; top: 2px; right: 2px; font-size: 0.6rem; z-index: 11; }

        .box { background: #1a1a1a; margin: 12px; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .leave-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #222; }
        .leave-input { width: 50px; background: #333; border: 1px solid #444; color: var(--pri); text-align: center; padding: 5px; border-radius: 4px; font-weight: bold; }
        
        .event-list-item { font-size: 0.75rem; padding: 8px; background: #222; border-radius: 6px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .event-date { color: var(--event); font-weight: bold; }

        .btn-action { background: #333; color: white; font-weight: bold; padding: 12px; border-radius: 10px; border: 1px solid #444; width: calc(100% - 24px); margin: 5px 12px; cursor: pointer; font-size: 0.75rem; }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; width: 90%; max-height: 90vh; overflow-y: auto; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }

        .shift-PR { background: var(--pri); color: #000; }
        .shift-SY { background: var(--syn); color: #fff; }
        .shift-AP { background: var(--apo); color: #fff; }
        .shift-VR { background: var(--vrad); color: #fff; border: 1px solid #444; }
        .shift-ΑΔ { background: var(--repo); color: #fff; }
        .shift-Ρεπ { background: #2a2a2a; color: #777; border: 1px dashed #444; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" id="btn-cal" onclick="showTab('calendar')">ΗΜΕΡΟΛΟΓΙΟ</button>
    <button class="tab-btn" id="btn-lea" onclick="showTab('leaves')">ΑΔΕΙΕΣ & ΣΧΟΛΙΑ</button>
</div>

<div id="tab-calendar">
    <div class="header">
        <select id="platoonSelect" class="platoon-select" onchange="changePlatoon()">
            <option value="351">ΔΙΜΟΙΡΙΑ 351</option>
            <option value="352">ΔΙΜΟΙΡΙΑ 352</option>
            <option value="353">ΔΙΜΟΙΡΙΑ 353</option>
            <option value="354">ΔΙΜΟΙΡΙΑ 354</option>
            <option value="355">ΔΙΜΟΙΡΙΑ 355</option>
        </select>
        <div class="header-top">
            <button onclick="changeMonth(-1)" style="background:none; color:white; border:none; font-size:1.5rem;">❮</button>
            <div id="monthLabel" class="month-label"></div>
            <button onclick="changeMonth(1)" style="background:none; color:white; border:none; font-size:1.5rem;">❯</button>
        </div>
    </div>
    
    <div class="days-header">
        <div class="day-name">ΔΕ</div><div class="day-name">ΤΡ</div><div class="day-name">ΤΕ</div><div class="day-name">ΠΕ</div><div class="day-name">ΠΑ</div><div class="day-name">ΣΑ</div><div class="day-name" style="color:#ff4d4d">ΚΥ</div>
    </div>
    <div class="grid" id="grid"></div>

    <button id="toggleEventsBtn" class="btn-action" onclick="toggleEvents()">📅 ΕΜΦΑΝΙΣΗ ΕΠΙΧΕΙΡΗΣΙΑΚΩΝ / ΣΧΟΛΙΩΝ</button>
    <button class="btn-action" style="background:var(--green); border:none;" onclick="togglePayroll()">📊 ΥΠΟΛΟΓΙΣΜΟΣ ΜΙΣΘΟΔΟΣΙΑΣ</button>
    
    <div id="payrollContent" class="box" style="display:none; border: 1px solid var(--green);">
        <div id="statsDetails" style="font-size: 0.85rem; line-height: 1.8;"></div>
        <div style="text-align: center; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px;">
            <div style="font-size: 1.8rem; font-weight: 900; color: var(--green);"><span id="grandTotal">0</span>€</div>
        </div>
    </div>
</div>

<div id="tab-leaves" style="display:none;">
    <div class="box">
        <h4 style="color:var(--pri); margin-top:0;">ΔΙΑΧΕΙΡΙΣΗ ΑΔΕΙΩΝ (ΕΤΟΣ)</h4>
        
        <div class="leave-row">
            <span>Κανονική Άδεια (ΚΑ)</span>
            <div>
                <input type="number" id="baseKA" class="leave-input" value="34" onchange="updateLeaveConfig()">
                <span style="color:#666">→ Υπόλοιπο:</span>
                <b id="remKA" style="color:var(--purp)">0</b>
            </div>
        </div>

        <div class="leave-row">
            <span>Βραχεία Άδεια (ΒΑ)</span>
            <div>
                <input type="number" id="baseBA" class="leave-input" value="11" onchange="updateLeaveConfig()">
                <span style="color:#666">→ Υπόλοιπο:</span>
                <b id="remBA" style="color:var(--purp)">0</b>
            </div>
        </div>

        <div class="leave-row">
            <span>Ρεπό Διαταγών (ΗΑ)</span>
            <div>
                <b id="countHA" style="color:var(--pri)">0</b> <small>χρησιμοποιήθηκαν</small>
            </div>
        </div>
    </div>

    <div class="box">
        <h4 style="color:var(--event); margin-top:0;">ΕΠΙΧΕΙΡΗΣΙΑΚΑ & ΣΧΟΛΙΑ ΕΤΟΥΣ</h4>
        <div id="fullEventList"></div>
    </div>
</div>

<div id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="dateDisplay" style="margin:0 0 15px 0; font-size:1rem;"></h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
            <button class="btn" onclick="toggleWorked()" style="background:var(--green); color:white;">ΔΟΥΛΕΨΑ ✓</button>
            <button class="btn" onclick="toggleStadium()" style="background:#f1c40f; color:black;">ΓΗΠΕΔΟ 🏟️</button>
        </div>
        <input type="text" id="dayNote" placeholder="Προσθήκη σχολίου..." style="width:100%; box-sizing:border-box; margin-bottom:10px; padding:10px; background:#222; color:white; border:1px solid #444; border-radius:8px;">
        <button class="btn" onclick="saveDayNote()" style="width:100%; background:#444; color:white; font-size:0.75rem; margin-bottom:20px;">ΑΠΟΘΗΚΕΥΣΗ ΣΧΟΛΙΟΥ</button>
        <div style="margin:10px 0 5px 0; font-weight:bold; font-size:0.7rem; color:#888; text-align:left;">ΑΔΕΙΑ</div>
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px; margin-bottom:15px;">
            <div class="btn" style="background:var(--purp); font-size:0.7rem; text-align:center;" onclick="setLeave('ΚΑ')">ΚΑ</div>
            <div class="btn" style="background:var(--purp); font-size:0.7rem; text-align:center;" onclick="setLeave('ΒΑ')">ΒΑ</div>
            <div class="btn" style="background:var(--pri); font-size:0.7rem; text-align:center; color:black;" onclick="setLeave('ΗΑ')">ΗΑ</div>
            <div class="btn" style="background:#333; font-size:0.7rem; text-align:center;" onclick="setLeave(null)">X</div>
        </div>
        <div style="margin:10px 0 5px 0; font-weight:bold; font-size:0.7rem; color:#888; text-align:left;">ΧΕΙΡΟΚΙΝΗΤΗ ΒΑΡΔΙΑ</div>
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:5px;">
            <div class="cell shift-PR" style="aspect-ratio:auto; padding:12px; font-weight:bold;" onclick="updateShift('PR')">ΠΡ</div>
            <div class="cell shift-SY" style="aspect-ratio:auto; padding:12px; font-weight:bold;" onclick="updateShift('SY')">ΣΥ</div>
            <div class="cell shift-AP" style="aspect-ratio:auto; padding:12px; font-weight:bold;" onclick="updateShift('AP')">ΑΠ</div>
            <div class="cell shift-VR" style="aspect-ratio:auto; padding:12px; font-weight:bold;" onclick="updateShift('VR')">ΒΡ</div>
            <div class="cell shift-ΑΔ" style="aspect-ratio:auto; padding:12px; font-weight:bold;" onclick="updateShift('ΑΔ')">ΑΔ</div>
            <div class="cell shift-Ρεπ" style="aspect-ratio:auto; padding:12px; font-weight:bold;" onclick="updateShift('Ρεπ')">Ρεπ</div>
        </div>
        <button class="btn" style="width:100%; margin-top:20px; background:#222; color:#fff;" onclick="closeModal()">ΑΚΥΡΩΣΗ</button>
    </div>
</div>

<script>
    let d = new Date(2026, 3, 1);
    const anchor = new Date(2026, 2, 31);
    const baseS = ["VR","ΑΔ","PR","SY","AP","VR","ΑΔ","PR","SY","AP","VR","ΑΔ","PR","SY","AP","VR","ΑΔ","PR","SY","AP","VR","ΑΔ","PR","SY","AP"];
    const baseL = ["ΝΔ","","Βουλή","---","Οικίες","Ηρώδου","","Κέντρο","---","ΝΔ","Βουλή","","Οικίες","---","Ηρώδου","Μον/κι","","ΝΔ","---","Βουλή","Οικίες","","Ηρώδου","---","---"];

    const platoonOffsets = { "351": 5, "352": 10, "353": 15, "354": 0, "355": 20 };

    const staticEvents = [
        { s: "2026-02-28", e: "2026-02-28", t: "ΤΕΜΠΗ" },
        { s: "2026-04-06", e: "2026-04-15", t: "ΠΑΣΧΑ" },
        { s: "2026-05-21", e: "2026-05-25", t: "FINAL 4" },
        { s: "2026-11-15", e: "2026-11-18", t: "ΠΟΛΥΤΕΧΝΕΙΟ" },
        { s: "2026-12-04", e: "2026-12-07", t: "ΓΡΗΓΟΡΟΠΟΥΛΟΣ" },
        { s: "2026-06-22", e: "2026-07-11", t: "Α' ΜΑΧΙΜΩΝ" },
        { s: "2026-07-12", e: "2026-07-31", t: "Β' ΜΑΧΙΜΩΝ" },
        { s: "2026-08-01", e: "2026-08-20", t: "Γ' ΜΑΧΙΜΩΝ" },
        { s: "2026-08-21", e: "2026-09-09", t: "Δ' ΜΑΧΙΜΩΝ" }
    ];

    let userShifts = JSON.parse(localStorage.getItem('userShifts')) || {};
    let workedDays = JSON.parse(localStorage.getItem('workedDays')) || {};
    let stadiumDays = JSON.parse(localStorage.getItem('stadiumDays')) || {};
    let leaveDays = JSON.parse(localStorage.getItem('leaveDays')) || {};
    let dayNotes = JSON.parse(localStorage.getItem('dayNotes')) || {};
    let selectedPlatoon = localStorage.getItem('selectedPlatoon') || "354";
    let showEvents = localStorage.getItem('showEvents') === 'true';
    let leaveConfig = JSON.parse(localStorage.getItem('leaveConfig')) || { ka: 34, ba: 11 };
    let activeKey = null;

    const settings = { base: 1100, pent: 46, night: 2.80, stad: 25 };

    function render() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        const months = ["Ιανουάριος","Φεβρουάριος","Μάρτιος","Απρίλιος","Μάιος","Ιούνιος","Ιούλιος","Αύγουστος","Σεπτέμβριος","Οκτώβριος","Νοέμβριος","Δεκέμβριος"];
        document.getElementById('monthLabel').innerText = months[d.getMonth()] + " " + d.getFullYear();
        document.getElementById('platoonSelect').value = selectedPlatoon;
        document.getElementById('baseKA').value = leaveConfig.ka;
        document.getElementById('baseBA').value = leaveConfig.ba;

        let firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
        let offset = (firstDay === 0) ? 6 : firstDay - 1;
        for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));

        let stats = { nights: 0, pent: 0, stad: 0 };
        let daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
        let pOff = platoonOffsets[selectedPlatoon];

        for(let i=1; i<=daysInMonth; i++) {
            let curr = new Date(d.getFullYear(), d.getMonth(), i);
            let dateStr = curr.toISOString().split('T')[0];
            let diff = Math.floor((curr - anchor)/86400000);
            let idx = (diff + pOff) % 25; if(idx < 0) idx += 25;

            let s = userShifts[dateStr] || baseS[idx];
            let cell = document.createElement('div');
            cell.className = `cell shift-${s} ${workedDays[dateStr] ? 'worked' : ''}`;
            
            if(workedDays[dateStr]) {
                if(s === "VR") stats.nights += 8;
                if(curr.getDay() === 6 || curr.getDay() === 0) stats.pent++;
            }
            if(stadiumDays[dateStr]) stats.stad++;

            let content = `<span class="num">${i}</span>`;
            if(leaveDays[dateStr]) content += `<div class="leave-overlay">${leaveDays[dateStr]}</div>`;
            else content += `<span class="shft">${s}</span><span class="loc">${(s==='ΑΔ'||s==='Ρεπ')?'':baseL[idx]}</span>`;
            if(stadiumDays[dateStr]) content += `<span class="stadium-mark">🏟️</span>`;

            if(showEvents) {
                let note = dayNotes[dateStr];
                let staticEv = staticEvents.find(e => dateStr >= e.s && dateStr <= e.e);
                let text = note || (staticEv ? staticEv.t : "");
                if(text) content += `<div class="event-bar"></div><div class="event-text">${text}</div>`;
            }
            
            cell.innerHTML = content;
            cell.onclick = () => openModal(dateStr, i);
            grid.appendChild(cell);
        }
        updatePayrollUI(stats);
        updateLeavesAndEventsUI();
    }

    function updateLeavesAndEventsUI() {
        let countKA = 0, countBA = 0, countHA = 0;
        Object.values(leaveDays).forEach(type => {
            if(type === 'ΚΑ') countKA++;
            if(type === 'ΒΑ') countBA++;
            if(type === 'ΗΑ') countHA++;
        });

        document.getElementById('remKA').innerText = leaveConfig.ka - countKA;
        document.getElementById('remBA').innerText = leaveConfig.ba - countBA;
        document.getElementById('countHA').innerText = countHA;

        // Λίστα Γεγονότων στο Tab Αδειών
        let eventHTML = '';
        staticEvents.forEach(ev => {
            eventHTML += `<div class="event-list-item"><span>${ev.t}</span><span class="event-date">${ev.s} έως ${ev.e}</span></div>`;
        });
        
        // Προσθήκη προσωπικών σχολίων που έχουν ημερομηνία
        Object.keys(dayNotes).sort().forEach(date => {
            eventHTML += `<div class="event-list-item" style="border-left:3px solid var(--pri)"><span>${dayNotes[date]}</span><span class="event-date">${date}</span></div>`;
        });
        
        document.getElementById('fullEventList').innerHTML = eventHTML || '<div style="color:#666; font-size:0.8rem;">Δεν υπάρχουν καταχωρημένα σχόλια ή γεγονότα.</div>';
    }

    function updateLeaveConfig() {
        leaveConfig.ka = parseInt(document.getElementById('baseKA').value);
        leaveConfig.ba = parseInt(document.getElementById('baseBA').value);
        localStorage.setItem('leaveConfig', JSON.stringify(leaveConfig));
        render();
    }

    function changePlatoon() { selectedPlatoon = document.getElementById('platoonSelect').value; localStorage.setItem('selectedPlatoon', selectedPlatoon); render(); }
    function openModal(key, day) { activeKey = key; document.getElementById('dateDisplay').innerText = day + " " + document.getElementById('monthLabel').innerText; document.getElementById('dayNote').value = dayNotes[key] || ""; document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function toggleWorked() { workedDays[activeKey] = !workedDays[activeKey]; localStorage.setItem('workedDays', JSON.stringify(workedDays)); render(); closeModal(); }
    function toggleStadium() { stadiumDays[activeKey] = !stadiumDays[activeKey]; localStorage.setItem('stadiumDays', JSON.stringify(stadiumDays)); render(); closeModal(); }
    function setLeave(type) { if(!type) delete leaveDays[activeKey]; else leaveDays[activeKey] = type; localStorage.setItem('leaveDays', JSON.stringify(leaveDays)); render(); closeModal(); }
    function updateShift(val) { userShifts[activeKey] = val; localStorage.setItem('userShifts', JSON.stringify(userShifts)); render(); closeModal(); }
    function saveDayNote() { let val = document.getElementById('dayNote').value.trim(); if(val) dayNotes[activeKey] = val; else delete dayNotes[activeKey]; localStorage.setItem('dayNotes', JSON.stringify(dayNotes)); render(); closeModal(); }
    function toggleEvents() { showEvents = !showEvents; localStorage.setItem('showEvents', showEvents); render(); }
    function changeMonth(n) { d.setMonth(d.getMonth()+n); render(); }
    function showTab(t) { document.getElementById('tab-calendar').style.display = t==='calendar'?'block':'none'; document.getElementById('tab-leaves').style.display = t==='leaves'?'block':'none'; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t.substring(0,3)).classList.add('active'); render(); }
    function updatePayrollUI(s) {
        let nTotal = (s.nights * settings.night).toFixed(2);
        let pTotal = (s.pent * settings.pent).toFixed(2);
        let stTotal = (s.stad * settings.stad).toFixed(2);
        document.getElementById('grandTotal').innerText = (parseFloat(nTotal) + parseFloat(pTotal) + parseFloat(stTotal)).toFixed(2);
        document.getElementById('statsDetails').innerHTML = `🌙 Νύχτα: <b>+${nTotal}€</b> | 📅 Πενθ: <b>+${pTotal}€</b> | 🏟️ Γήπεδο: <b>+${stTotal}€</b>`;
    }
    function togglePayroll() { let c = document.getElementById('payrollContent'); c.style.display = c.style.display==='none'?'block':'none'; }

    render();
</script>
</body>
</html>
