<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Tracker Pro</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --txt: #ffffff;
            --pri: #70d1ff; --syn: #ff2e2e; --apo: #c45b00; --vrad: #000000; --repo: #7d7d7d;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 50px; }
        .header { background: #222; padding: 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #444; }
        .days-header { display: grid; grid-template-columns: repeat(7, 1fr); background: #222; padding: 5px 10px; border-bottom: 1px solid #333; }
        .day-name { text-align: center; font-size: 0.7rem; font-weight: bold; color: #888; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 10px; }
        .cell { aspect-ratio: 1/1.6; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #333; position: relative; font-size: 0.75rem; transition: 0.2s; }
        
        .worked { outline: 3px solid #2ecc71; outline-offset: -3px; background-color: rgba(46, 204, 113, 0.1); }
        .stadium-mark { position: absolute; bottom: 2px; right: 2px; font-size: 0.7rem; }
        
        /* Ρυθμίσεις Μισθού */
        .settings-box { background: #222; margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid #444; }
        .settings-box input { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; width: 60px; text-align: center; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.85rem; }

        .stats-box { background: #1e1e1e; margin: 15px; padding: 15px; border-radius: 12px; border: 2px solid #2ecc71; }
        .total-line { font-size: 1.2rem; font-weight: bold; text-align: center; color: #2ecc71; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #444; }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: #222; width: 85%; padding: 20px; border-radius: 15px; text-align: center; }
        .m-btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 8px; }
        
        /* Χρώματα Βαρδιών */
        .shift-PR { background: var(--pri); color: #000; }
        .shift-SY { background: var(--syn); color: #fff; }
        .shift-AP { background: var(--apo); color: #fff; }
        .shift-VR { background: var(--vrad); color: #fff; border: 1px solid #555; }
        .shift-AD { background: var(--repo); color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <button onclick="changeMonth(-1)" style="background:none; color:white; border:none; font-size:1.5rem;">❮</button>
    <div id="monthLabel" style="font-weight:bold;"></div>
    <button onclick="changeMonth(1)" style="background:none; color:white; border:none; font-size:1.5rem;">❯</button>
</div>

<div class="days-header">
    <div class="day-name">Δε</div><div class="day-name">Τρ</div><div class="day-name">Τε</div><div class="day-name">Πε</div><div class="day-name">Πα</div><div class="day-name">Σα</div><div class="day-name" style="color:#ff4d4d">Κυ</div>
</div>

<div class="grid" id="grid"></div>

<div class="settings-box">
    <h4 style="margin:0 0 10px 0; color:#888; font-size:0.8rem; text-transform:uppercase;">⚙️ Ρυθμίσεις Αμοιβών</h4>
    <div class="setting-row">Βασικός Μισθός: <span><input type="number" id="baseSalary" value="1600" oninput="saveSettings()"> €</span></div>
    <div class="setting-row">Αμοιβή Πενθημέρου: <span><input type="number" id="payPent" value="50" oninput="saveSettings()"> €</span></div>
    <div class="setting-row">Νυχτερινό (ανά ώρα): <span><input type="number" id="payNight" value="3" oninput="saveSettings()" step="0.1"> €</span></div>
    <div class="setting-row">Γήπεδο (έξτρα): <span><input type="number" id="payStad" value="20" oninput="saveSettings()"> €</span></div>
</div>

<div class="stats-box">
    <div id="statsBreakdown" style="font-size:0.85rem; line-height:1.6;"></div>
    <div class="total-line">Εκτίμηση: <span id="grandTotal">0</span> €</div>
</div>

<div id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h4 id="dateDisplay" style="margin-bottom:15px"></h4>
        <button class="m-btn" id="confirmToggle" onclick="toggleWorked()" style="background:#2ecc71; color:white">Επιβεβαίωση Εργασίας</button>
        <button class="m-btn" id="stadiumToggle" onclick="toggleStadium()" style="background:#f1c40f; color:black">🏟️ Γήπεδο</button>
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:5px; margin-top:10px;">
            <div class="m-btn shift-PR" onclick="updateShift('PR')">ΠΡ</div>
            <div class="m-btn shift-SY" onclick="updateShift('SY')">ΣΥ</div>
            <div class="m-btn shift-AP" onclick="updateShift('AP')">ΑΠ</div>
            <div class="m-btn shift-VR" onclick="updateShift('VR')">ΒΡ</div>
            <div class="m-btn shift-AD" onclick="updateShift('AD')">ΑΔ</div>
            <div class="m-btn" style="background:#444; color:white" onclick="closeModal()">✖</div>
        </div>
    </div>
</div>

<script>
    let d = new Date(2026, 3, 1);
    const anchor = new Date(2026, 2, 31);
    const baseS = ["VR","AD","PR","SY","AP","VR","AD","8-16","SY","AP","VR","AD","PR","SY","AP","VR","AD","PR","SY","AP","VR","AD","PR","SY","AP"];
    const baseL = ["ΝΔ","","Βουλή","---","Οικίες","Ηρώδου","","Κέντρο","---","ΝΔ","Βουλή","","Οικίες","---","Ηρώδου","Μον/κι","","ΝΔ","---","Βουλή","Οικίες","","Ηρώδου","---","---"];

    // Φόρτωση δεδομένων από LocalStorage
    let userShifts = JSON.parse(localStorage.getItem('userShifts')) || {};
    let workedDays = JSON.parse(localStorage.getItem('workedDays')) || {};
    let stadiumDays = JSON.parse(localStorage.getItem('stadiumDays')) || {};
    let activeKey = null;

    // Φόρτωση Ρυθμίσεων
    const settings = JSON.parse(localStorage.getItem('payrollSettings')) || { base: 1600, pent: 50, night: 3, stad: 20 };
    document.getElementById('baseSalary').value = settings.base;
    document.getElementById('payPent').value = settings.pent;
    document.getElementById('payNight').value = settings.night;
    document.getElementById('payStad').value = settings.stad;

    function saveSettings() {
        settings.base = parseFloat(document.getElementById('baseSalary').value) || 0;
        settings.pent = parseFloat(document.getElementById('payPent').value) || 0;
        settings.night = parseFloat(document.getElementById('payNight').value) || 0;
        settings.stad = parseFloat(document.getElementById('payStad').value) || 0;
        localStorage.setItem('payrollSettings', JSON.stringify(settings));
        render();
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const months = ["Ιανουάριος","Φεβρουάριος","Μάρτιος","Απρίλιος","Μάιος","Ιούνιος","Ιούλιος","Αύγουστος","Σεπτέμβριος","Οκτώβριος","Νοέμβριος","Δεκέμβριος"];
        document.getElementById('monthLabel').innerText = months[d.getMonth()] + " " + d.getFullYear();

        let firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
        let offset = (firstDay === 0) ? 6 : firstDay - 1;
        for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));

        let stats = { nightHours: 0, pent: 0, stad: 0 };
        let daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();

        for(let i=1; i<=daysInMonth; i++) {
            let curr = new Date(d.getFullYear(), d.getMonth(), i);
            let key = curr.toISOString().split('T')[0];
            let diff = Math.floor((curr - anchor)/86400000);
            let idx = diff % 25; if(idx<0) idx+=25;

            let s = userShifts[key] || baseS[idx];
            let l = baseL[idx];
            let isWorked = workedDays[key];
            let isStad = stadiumDays[key];

            if(isWorked) {
                if(s === "VR") stats.nightHours += 8;
                if(curr.getDay() === 6 || curr.getDay() === 0) stats.pent++;
            }
            if(isStad) stats.stad++;

            let cell = document.createElement('div');
            cell.className = `cell shift-${s.replace(' ','-')} ${isWorked ? 'worked' : ''}`;
            cell.innerHTML = `<span class="num">${i}</span><span class="shft">${s}</span><span class="loc">${s==='AD'?'':l}</span>${isStad?'<span class="stadium-mark">🏟️</span>':''}`;
            cell.onclick = () => openModal(key, i, isWorked, isStad);
            grid.appendChild(cell);
        }

        // Υπολογισμοί
        let nightTotal = stats.nightHours * settings.night;
        let pentTotal = stats.pent * settings.pent;
        let stadTotal = stats.stad * settings.stad;
        let final = settings.base + nightTotal + pentTotal + stadTotal;

        document.getElementById('statsBreakdown').innerHTML = `
            🔹 Σταθερός Μισθός: ${settings.base}€<br>
            🌙 Νυχτερινά (${stats.nightHours}h): +${nightTotal.toFixed(2)}€<br>
            📅 Πενθήμερα (${stats.pent}): +${pentTotal}€<br>
            🏟️ Γήπεδα (${stats.stad}): +${stadTotal}€
        `;
        document.getElementById('grandTotal').innerText = final.toFixed(2);
    }

    function openModal(key, dayNum, isWorked, isStad) {
        activeKey = key;
        document.getElementById('dateDisplay').innerText = dayNum + " " + document.getElementById('monthLabel').innerText;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function toggleWorked() {
        workedDays[activeKey] = !workedDays[activeKey];
        if(!workedDays[activeKey]) delete workedDays[activeKey];
        localStorage.setItem('workedDays', JSON.stringify(workedDays));
        closeModal(); render();
    }

    function toggleStadium() {
        stadiumDays[activeKey] = !stadiumDays[activeKey];
        if(!stadiumDays[activeKey]) delete stadiumDays[activeKey];
        localStorage.setItem('stadiumDays', JSON.stringify(stadiumDays));
        closeModal(); render();
    }

    function updateShift(val) {
        userShifts[activeKey] = val;
        localStorage.setItem('userShifts', JSON.stringify(userShifts));
        closeModal(); render();
    }

    function changeMonth(n) { d.setMonth(d.getMonth()+n); render(); }
    render();
</script>
</body>
</html>
