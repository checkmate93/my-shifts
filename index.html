<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work & Leaves Elite v12</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --txt: #ffffff;
            --pri: #70d1ff; --syn: #ff2e2e; --apo: #c45b00; --vrad: #000000; --repo: #4a4a4a; --green: #2ecc71; --purp: #a55eea;
            --event: #f1c40f;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 30px; }
        .tabs { display: flex; background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; padding: 5px; gap: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #222; color: #666; border-radius: 8px; font-weight: bold; font-size: 0.65rem; }
        .tab-btn.active { color: var(--pri); background: #333; }
        .header { padding: 10px 15px; display: flex; flex-direction: column; gap: 10px; }
        .month-label { font-weight: 800; font-size: 0.9rem; text-transform: uppercase; color: var(--pri); }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 10px; }
        .day-name { text-align: center; font-size: 0.65rem; color: #555; font-weight: bold; }
        .cell { aspect-ratio: 1/1.4; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #222; position: relative; font-size: 0.75rem; overflow: hidden; }
        .num { position: absolute; top: 2px; left: 3px; font-size: 0.65rem; opacity: 0.5; font-weight: bold; }
        .shft { font-weight: 900; font-size: 0.85rem; z-index: 10; }
        .loc { font-size: 0.5rem; font-weight: bold; opacity: 0.9; text-align: center; z-index: 10; line-height: 0.9; padding: 0 2px; }
        .event-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--event); z-index: 12; }
        .event-text { position: absolute; bottom: 3px; left: 0; right: 0; font-size: 0.4rem; text-align: center; background: rgba(0,0,0,0.85); color: var(--event); font-weight: bold; white-space: nowrap; overflow: hidden; z-index: 13; }
        .worked { outline: 2px solid var(--green); outline-offset: -2px; }
        .leave-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(165, 94, 234, 0.7); font-size: 1rem; font-weight: 900; color: white; z-index: 15; }
        .box { background: #1a1a1a; margin: 12px; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .btn-action { background: #333; color: white; font-weight: bold; padding: 12px; border-radius: 10px; border: 1px solid #444; width: calc(100% - 24px); margin: 5px 12px; cursor: pointer; font-size: 0.75rem; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; width: 85%; padding: 20px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        .shift-PR { background: var(--pri); color: #000; }
        .shift-SY { background: var(--syn); color: #fff; }
        .shift-AP { background: var(--apo); color: #fff; }
        .shift-VR { background: var(--vrad); color: #fff; border: 1px solid #444; }
        .shift-ΑΔ { background: var(--repo); color: #fff; }
        .doc-paper { background: #fdfdfd; color: #000; padding: 15px; border-radius: 4px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .setting-row input { width: 70px; background: #222; border: 1px solid #444; color: var(--pri); padding: 5px; border-radius: 5px; text-align: center; }
        .leave-badge { background: #222; padding: 10px; border-radius: 10px; text-align: center; flex: 1; }
        .leave-badge input { background: transparent; border: none; color: white; font-weight: bold; width: 30px; text-align: center; font-size: 1rem; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" id="btn-cal" onclick="showTab('calendar')">ΗΜΕΡΟΛΟΓΙΟ</button>
    <button class="tab-btn" id="btn-lea" onclick="showTab('leaves')">ΣΧΟΛΙΑ/ΑΔΕΙΕΣ</button>
    <button class="tab-btn" id="btn-set" onclick="showTab('settings')">ΡΥΘΜΙΣΕΙΣ</button>
</div>

<div id="tab-calendar">
    <div class="header">
        <select id="platoonSelect" style="width:100%; background:#222; color:var(--pri); padding:10px; border:1px solid #444; border-radius:8px;" onchange="changePlatoon()">
            <option value="351">ΔΙΜΟΙΡΙΑ 351</option><option value="352">ΔΙΜΟΙΡΙΑ 352</option><option value="353">ΔΙΜΟΙΡΙΑ 353</option><option value="354">ΔΙΜΟΙΡΙΑ 354</option><option value="355">ΔΙΜΟΙΡΙΑ 355</option>
        </select>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="changeMonth(-1)" style="background:none; color:white; border:none; font-size:1.5rem;">❮</button>
            <div id="monthLabel" class="month-label"></div>
            <button onclick="changeMonth(1)" style="background:none; color:white; border:none; font-size:1.5rem;">❯</button>
        </div>
    </div>
    <div class="days-header">
        <div class="day-name">ΔΕ</div><div class="day-name">ΤΡ</div><div class="day-name">ΤΕ</div><div class="day-name">ΠΕ</div><div class="day-name">ΠΑ</div><div class="day-name">ΣΑ</div><div class="day-name" style="color:#ff4d4d">ΚΥ</div>
    </div>
    <div class="grid" id="grid"></div>
    <button class="btn-action" onclick="toggleEvents()">📅 ΕΜΦΑΝΙΣΗ ΣΧΟΛΙΩΝ</button>
    <button class="btn-action" style="background:var(--green); border:none;" onclick="togglePayroll()">📊 ΜΙΣΘΟΔΟΣΙΑ</button>
    <div id="payrollContent" class="box" style="display:none; border: 1.5px solid var(--green);">
        <div id="statsDetails" style="font-size: 0.75rem; line-height: 1.7;"></div>
        <div style="text-align: center; border-top: 1px solid #333; padding-top: 8px; margin-top: 5px;">
            <div style="font-size: 1.6rem; font-weight: 900; color: var(--green);"><span id="grandTotal">0</span>€</div>
        </div>
    </div>
</div>

<div id="tab-leaves" style="display:none; padding: 10px;">
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <div class="leave-badge"><div>ΚΑ</div><input type="number" id="baseKA" onchange="saveLeaves()"><div style="font-size:0.6rem; color:var(--purp)">Υπ: <span id="remKA"></span></div></div>
        <div class="leave-badge"><div>ΒΑ</div><input type="number" id="baseBA" onchange="saveLeaves()"><div style="font-size:0.6rem; color:var(--purp)">Υπ: <span id="remBA"></span></div></div>
        <div class="leave-badge"><div>ΗΑ</div><input type="number" id="baseHA" onchange="saveLeaves()"><div style="font-size:0.6rem; color:var(--pri)">Υπ: <span id="remHA"></span></div></div>
    </div>
    <div class="doc-paper">
        <h4 style="margin:0 0 10px 0; border-bottom:1px solid #ddd; font-size:0.8rem;">ΣΧΟΛΙΑ ΜΗΝΑ</h4>
        <div id="docContent" style="font-size:0.8rem;"></div>
    </div>
    <div class="doc-paper">
        <h4 style="margin:0 0 10px 0; border-bottom:1px solid #ddd; font-size:0.8rem;">ΠΡΟΓΡΑΜΜΑ (EDITABLE)</h4>
        <div id="referencePeriods" style="font-size:0.7rem; white-space:pre-line;" contenteditable="true" onblur="saveRef()"></div>
    </div>
</div>

<div id="tab-settings" style="display:none; padding: 10px;">
    <div class="box">
        <h4 style="color:var(--green); margin-top:0;">💰 ΟΙΚΟΝΟΜΙΚΑ</h4>
        <div class="setting-row"><span>Βασικός</span><input type="number" id="setBase" oninput="saveSet()"></div>
        <div class="setting-row"><span>Νυχτερινό</span><input type="number" step="0.01" id="setNight" oninput="saveSet()"></div>
        <div class="setting-row"><span>Πενθήμερο</span><input type="number" step="0.01" id="setPent" oninput="saveSet()"></div>
        <div class="setting-row"><span>Γήπεδο</span><input type="number" step="0.01" id="setStad" oninput="saveSet()"></div>
    </div>
    <div class="box">
        <h4 style="color:var(--pri); margin-top:0;">🔐 ΑΣΦΑΛΕΙΑ</h4>
        <div class="setting-row"><span>Κωδικός Reset</span><input type="text" id="setPass" oninput="saveSet()"></div>
        <button class="btn-action" style="background:#c0392b; width:100%; margin:10px 0 0 0;" onclick="clearAllData()">⚠️ ΟΛΙΚΗ ΔΙΑΓΡΑΦΗ</button>
    </div>
</div>

<div id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="dateDisplay" style="color:var(--pri); margin-bottom:15px;"></h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
            <button onclick="toggleWorked()" style="padding:15px; border-radius:10px; border:none; background:var(--green); color:white; font-weight:bold;">ΔΟΥΛΕΨΑ</button>
            <button onclick="toggleStadium()" style="padding:15px; border-radius:10px; border:none; background:#f1c40f; color:black; font-weight:bold;">ΓΗΠΕΔΟ</button>
        </div>
        <input type="text" id="dayNote" placeholder="Προσθήκη σχολίου..." style="width:100%; padding:12px; background:#222; color:white; border:1px solid #444; border-radius:10px; box-sizing:border-box; margin-bottom:10px;">
        <button onclick="saveDayNote()" style="width:100%; padding:12px; border-radius:10px; border:none; background:var(--pri); font-weight:bold;">ΑΠΟΘΗΚΕΥΣΗ</button>
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px; margin-top:15px;">
            <button onclick="setLeave('ΚΑ')" style="background:var(--purp); border:none; padding:10px; border-radius:5px; color:white;">ΚΑ</button>
            <button onclick="setLeave('ΒΑ')" style="background:var(--purp); border:none; padding:10px; border-radius:5px; color:white;">ΒΑ</button>
            <button onclick="setLeave('ΗΑ')" style="background:var(--pri); border:none; padding:10px; border-radius:5px; color:black;">ΗΑ</button>
            <button onclick="setLeave(null)" style="background:#444; border:none; padding:10px; border-radius:5px; color:white;">X</button>
        </div>
    </div>
</div>

<script>
    let d = new Date(2026, 2, 1);
    const anchor = new Date(2026, 2, 31);
    const baseS = ["VR","ΑΔ","PR","SY","AP","VR","ΑΔ","PR","SY","AP","VR","ΑΔ","PR","SY","AP","VR","ΑΔ","PR","SY","AP","VR","ΑΔ","PR","SY","AP"];
    const baseL = ["ΝΔ","","Βουλή","---","Οικίες","Ηρώδου","","Κέντρο","---","ΝΔ","Βουλή","","Οικίες","---","Ηρώδου","Μον/κι","","ΝΔ","---","Βουλή","Οικίες","","Ηρώδου","---","---"];
    const platoonOffsets = { "351": 5, "352": 10, "353": 15, "354": 0, "355": 20 };

    let workedDays = JSON.parse(localStorage.getItem('workedDays')) || {};
    let stadiumDays = JSON.parse(localStorage.getItem('stadiumDays')) || {};
    let leaveDays = JSON.parse(localStorage.getItem('leaveDays')) || {};
    let dayNotes = JSON.parse(localStorage.getItem('dayNotes')) || {
        "2026-02-28": "ΕΠΕΤΕΙΟΣ ΤΕΜΠΩΝ", "2026-04-25": "ΤΕΛΙΚΟΣ ΚΥΠΕΛΛΟΥ", "2026-05-21": "FINAL 4", "2026-11-17": "ΠΟΛΥΤΕΧΝΕΙΟ", "2026-12-06": "ΓΡΗΓΟΡΟΠΟΥΛΟΣ"
    };
    let settings = JSON.parse(localStorage.getItem('appSettings')) || { base: 1100, night: 2.81, pent: 46.00, stad: 25.00, pass: "1" };
    let leaveConfig = JSON.parse(localStorage.getItem('leaveConfig')) || { ka: 34, ba: 11, ha: 0 };
    let referenceData = localStorage.getItem('referenceData') || `Μαχίμων – Οδηγών:\nΑ' 22/6-11/7 | Β' 12/7-31/7\n\nΒαθμοφόρων:\nΑ' 1/7-20/7 | Β' 21/7-9/8`;
    let selectedPlatoon = localStorage.getItem('selectedPlatoon') || "354";
    let showEvents = localStorage.getItem('showEvents') === 'true';
    let activeKey = null;

    function render() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        const months = ["Ιανουάριος","Φεβρουάριος","Μάρτιος","Απρίλιος","Μάιος","Ιούνιος","Ιούλιος","Αύγουστος","Σεπτέμβριος","Οκτώβριος","Νοέμβριος","Δεκέμβριος"];
        document.getElementById('monthLabel').innerText = months[d.getMonth()] + " " + d.getFullYear();
        
        // Sync Settings Tab
        document.getElementById('setBase').value = settings.base;
        document.getElementById('setNight').value = settings.night;
        document.getElementById('setPent').value = settings.pent;
        document.getElementById('setStad').value = settings.stad;
        document.getElementById('setPass').value = settings.pass;
        document.getElementById('baseKA').value = leaveConfig.ka;
        document.getElementById('baseBA').value = leaveConfig.ba;
        document.getElementById('baseHA').value = leaveConfig.ha;
        document.getElementById('referencePeriods').innerText = referenceData;

        let firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
        let offset = (firstDay === 0) ? 6 : firstDay - 1;
        for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));

        let stats = { nights: 0, pent: 0, stad: 0 };
        let daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
        let pOff = platoonOffsets[selectedPlatoon];

        for(let i=1; i<=daysInMonth; i++) {
            let curr = new Date(d.getFullYear(), d.getMonth(), i);
            let dateStr = curr.toISOString().split('T')[0];
            let diff = Math.floor((curr - anchor)/86400000);
            let idx = (diff + pOff) % 25; if(idx < 0) idx += 25;

            let s = baseS[idx];
            let cell = document.createElement('div');
            cell.className = `cell shift-${s} ${workedDays[dateStr] ? 'worked' : ''}`;
            
            if(workedDays[dateStr]) {
                if(s === "VR") stats.nights += 8;
                if(curr.getDay() === 6 || curr.getDay() === 0) stats.pent++;
            }
            if(stadiumDays[dateStr]) stats.stad++;

            let content = `<span class="num">${i}</span>`;
            if(leaveDays[dateStr]) content += `<div class="leave-overlay">${leaveDays[dateStr]}</div>`;
            else content += `<span class="shft">${s}</span><span class="loc">${(s==='ΑΔ') ? '' : baseL[idx]}</span>`;
            
            if(stadiumDays[dateStr]) content += `<span class="stadium-mark">🏟️</span>`;
            if(showEvents && dayNotes[dateStr]) {
                content += `<div class="event-bar"></div><div class="event-text">${dayNotes[dateStr]}</div>`;
            }
            
            cell.innerHTML = content;
            cell.onclick = () => openModal(dateStr, i);
            grid.appendChild(cell);
        }
        updatePayrollUI(stats);
        updateLeavesUI();
    }

    function updatePayrollUI(s) {
        let b = parseFloat(settings.base) || 0;
        let n = (s.nights * (parseFloat(settings.night) || 0));
        let p = (s.pent * (parseFloat(settings.pent) || 0));
        let st = (s.stad * (parseFloat(settings.stad) || 0));
        document.getElementById('grandTotal').innerText = (b + n + p + st).toFixed(2);
        document.getElementById('statsDetails').innerHTML = `🏠 Σταθερός: ${b}€ | 🌙 Νύχτα: +${n.toFixed(2)}€<br>📅 Πενθήμερα (${s.pent}): +${p.toFixed(2)}€ | 🏟️ Γήπεδα (${s.stad}): +${st.toFixed(2)}€`;
    }

    function updateLeavesUI() {
        let counts = { ΚΑ: 0, ΒΑ: 0, ΗΑ: 0 };
        Object.values(leaveDays).forEach(v => { if(counts[v]!==undefined) counts[v]++; });
        document.getElementById('remKA').innerText = leaveConfig.ka - counts.ΚΑ;
        document.getElementById('remBA').innerText = leaveConfig.ba - counts.ΒΑ;
        document.getElementById('remHA').innerText = leaveConfig.ha - counts.ΗΑ;

        let html = '';
        let mStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        Object.keys(dayNotes).filter(k => k.startsWith(mStr)).sort().forEach(k => {
            html += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #eee;">
                <span><b>${k.split('-')[2]}:</b> ${dayNotes[k]}</span>
                <button onclick="deleteNote('${k}')" style="background:none; border:none; color:red;">🗑️</button>
            </div>`;
        });
        document.getElementById('docContent').innerHTML = html || 'Κανένα σχόλιο.';
    }

    function saveSet() {
        settings.base = document.getElementById('setBase').value;
        settings.night = document.getElementById('setNight').value;
        settings.pent = document.getElementById('setPent').value;
        settings.stad = document.getElementById('setStad').value;
        settings.pass = document.getElementById('setPass').value;
        localStorage.setItem('appSettings', JSON.stringify(settings));
        render();
    }

    function saveLeaves() {
        leaveConfig.ka = parseInt(document.getElementById('baseKA').value) || 0;
        leaveConfig.ba = parseInt(document.getElementById('baseBA').value) || 0;
        leaveConfig.ha = parseInt(document.getElementById('baseHA').value) || 0;
        localStorage.setItem('leaveConfig', JSON.stringify(leaveConfig));
        render();
    }

    function openModal(k, day) { activeKey = k; document.getElementById('dateDisplay').innerText = day + " " + document.getElementById('monthLabel').innerText; document.getElementById('dayNote').value = dayNotes[k] || ""; document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function toggleWorked() { workedDays[activeKey] = !workedDays[activeKey]; localStorage.setItem('workedDays', JSON.stringify(workedDays)); render(); closeModal(); }
    function toggleStadium() { stadiumDays[activeKey] = !stadiumDays[activeKey]; localStorage.setItem('stadiumDays', JSON.stringify(stadiumDays)); render(); closeModal(); }
    function setLeave(t) { if(!t) delete leaveDays[activeKey]; else leaveDays[activeKey] = t; localStorage.setItem('leaveDays', JSON.stringify(leaveDays)); render(); closeModal(); }
    function saveDayNote() { let v = document.getElementById('dayNote').value.trim(); if(v) dayNotes[activeKey] = v; else delete dayNotes[activeKey]; localStorage.setItem('dayNotes', JSON.stringify(dayNotes)); render(); closeModal(); }
    function deleteNote(k) { delete dayNotes[k]; localStorage.setItem('dayNotes', JSON.stringify(dayNotes)); render(); }
    function saveRef() { referenceData = document.getElementById('referencePeriods').innerText; localStorage.setItem('referenceData', referenceData); }
    function changeMonth(n) { d.setMonth(d.getMonth()+n); render(); }
    function toggleEvents() { showEvents = !showEvents; localStorage.setItem('showEvents', showEvents); render(); }
    function togglePayroll() { let c = document.getElementById('payrollContent'); c.style.display = (c.style.display==='none'?'block':'none'); }
    function changePlatoon() { selectedPlatoon = document.getElementById('platoonSelect').value; localStorage.setItem('selectedPlatoon', selectedPlatoon); render(); }
    function showTab(t) { document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none'); document.getElementById('tab-'+t).style.display = 'block'; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t.substring(0,3)).classList.add('active'); }
    function clearAllData() { if(confirm("ΠΡΟΣΟΧΗ: Ολική διαγραφή;")) { if(prompt("Κωδικός:") === settings.pass) { localStorage.clear(); location.reload(); } else { alert("Λάθος κωδικός!"); } } }

    render();
</script>
</body>
</html>
